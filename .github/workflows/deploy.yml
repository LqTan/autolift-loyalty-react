name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: npm run build

      - name: Package dist
        run: tar -czf dist.tar.gz dist

      - name: Deploy to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist.tar.gz"
          target: "/tmp/"
          strip_components: 0

      - name: Extract and restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            APP_DIR="/var/www/autolift-dashboard"

            # Stop old PM2 process if running
            pm2 stop autolift-dashboard 2>/dev/null || true

            # Create app directory if not exists
            mkdir -p $APP_DIR

            # Remove old files
            rm -rf $APP_DIR/dist $APP_DIR/.env

            # Extract dist from tarball
            tar -xzf /tmp/dist.tar.gz -C $APP_DIR/

            # Create .env file
            echo "VITE_API_BASE_URL=${{ secrets.API_BASE_URL }}" > $APP_DIR/.env

            # Cleanup tarball
            rm /tmp/dist.tar.gz

            # Navigate to app dir and restart PM2
            cd $APP_DIR
            pm2 delete autolift-dashboard 2>/dev/null || true
            pm2 start npm --name autolift-dashboard -- start
            pm2 save
            pm2 restart autolift-dashboard